{% extends "base.html" %}



{% block content %}




<div class="page-header">


<h1>

📋 Logs del Sistema

</h1>


<p>

Historial de actividad administrativa.

</p>


</div>






<div class="table-container">



<table>


<thead>


<tr>

<th>ID</th>

<th>Administrador</th>

<th>Acción</th>

<th>Fecha</th>

</tr>


</thead>




<tbody>



{% for log in logs %}


<tr>


<td>

{{ log[0] }}

</td>


<td>

{{ log[1] }}

</td>


<td>

{{ log[2] }}

</td>


<td>

{{ log[3] }}

</td>



</tr>



{% endfor %}




</tbody>


</table>



</div>




{% endblock %}
